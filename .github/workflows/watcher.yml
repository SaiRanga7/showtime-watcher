name: Showtime Watcher

on:
  schedule:
    - cron: "0 8-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: showtime-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests pyyaml python-dotenv
          playwright install --with-deps chromium

      - name: Run watcher (single pass)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ONESHOT: "1"
        run: python watcher.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain state.db)" ]; then
            git add state.db
            git commit -m "Update notification state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi